<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Claim Submission</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <h1>Submit Claim</h1>

    <div class="card">

        <form id="claimForm">

            <input type="number"
                   id="employeeId"
                   placeholder="Employee ID"
                   required>

            <input type="number"
                   id="amount"
                   placeholder="Claim Amount"
                   required>

            <textarea id="description"
                      placeholder="Claim Description"
                      required></textarea>

            <button type="submit">
                Submit Claim
            </button>

        </form>

    </div>

    <div class="card">

        <h2>Claim History</h2>

        <div id="claimList"></div>

    </div>

</div>

<script src="js/claims.js"></script>

</body>
</html>
