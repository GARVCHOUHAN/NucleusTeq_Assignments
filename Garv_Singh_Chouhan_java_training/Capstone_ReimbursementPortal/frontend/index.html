<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReimburseHub — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-page">

<!-- ── LOGIN CARD ── -->
<div class="login-container">

    <div class="login-header">
        <div class="login-logo">Reimburse<span>Hub</span></div>
        <p class="login-subtitle">Sign in to your account</p>
    </div>

    <!-- Error / Success messages -->
    <div class="alert alert-error" id="loginError" style="display:none"></div>

    <form id="loginForm" autocomplete="off">

        <div class="form-group">
            <label for="loginEmail">Work Email</label>
            <input
                    class="form-input"
                    type="email"
                    id="loginEmail"
                    placeholder="name@company.com"
                    required
            />
        </div>

        <div class="form-group">
            <label for="loginPassword">Password</label>
            <input
                    class="form-input"
                    type="password"
                    id="loginPassword"
                    placeholder="Enter your password"
                    required
            />
        </div>

        <button class="btn btn-primary btn-block" type="submit" id="loginBtn">
            <span id="loginBtnLabel">Sign In</span>
            <span class="spinner" id="loginSpinner"></span>
        </button>

    </form>

    <p class="auth-switch">
        New to ReimburseHub?
        <a href="signup.html">Create an account</a>
    </p>

</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/index.js"></script>

</body>
</html>
