<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Management</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1>User Management</h1>

    <div class="card">

        <h2>Create User</h2>

        <form id="userForm">

            <input type="text"
                   id="fullName"
                   placeholder="Full Name"
                   required>

            <input type="email"
                   id="email"
                   placeholder="Company Email"
                   required>

            <input type="password"
                   id="password"
                   placeholder="Password"
                   required>

            <select id="role">

                <option value="EMPLOYEE">
                    EMPLOYEE
                </option>

                <option value="MANAGER">
                    MANAGER
                </option>

                <option value="ADMIN">
                    ADMIN
                </option>

            </select>

            <button type="submit">
                Create User
            </button>

        </form>

    </div>

    <div class="card">

        <h2>All Users</h2>

        <div id="userList"></div>

    </div>

</div>

<script src="js/users.js"></script>

</body>
</html>
