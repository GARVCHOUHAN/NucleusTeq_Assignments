<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Inventory Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-text">
        <h1>Product Inventory Dashboard</h1>
        <p>
          Track stock, manage products, and monitor inventory insights from one dashboard.
        </p>
      </div>
    </header>

    <section class="controls-section card">
      <div class="section-header">
        <h2>Controls</h2>
        <p class="section-subtext">Search, filter, and sort products easily.</p>
      </div>

      <div class="controls-grid">
        <div class="form-group">
          <label for="searchInput">Search Product</label>
          <input
            type="text"
            id="searchInput"
            placeholder="Search by product name..."
          />
        </div>

        <div class="form-group">
          <label for="categoryFilter">Filter by Category</label>
          <select id="categoryFilter">
            <option value="all">All Categories</option>
          </select>
        </div>

        <div class="form-group">
          <label for="sortOption">Sort Products</label>
          <select id="sortOption">
            <option value="default">Default</option>
            <option value="priceLowToHigh">Price: Low to High</option>
            <option value="priceHighToLow">Price: High to Low</option>
            <option value="nameAToZ">Alphabetically A-Z</option>
            <option value="nameZToA">Alphabetically Z-A</option>
          </select>
        </div>

        <div class="form-group checkbox-group">
          <label for="lowStockOnly">Low Stock Only</label>
          <div class="checkbox-wrapper">
            <input type="checkbox" id="lowStockOnly" />
            <span>Show products with stock less than 5</span>
          </div>
        </div>
      </div>

      <div class="button-row">
        <button id="resetFiltersBtn" class="secondary-btn" type="button">
          Reset Filters
        </button>
      </div>
    </section>

    
  </div>

  <script src="script.js"></script>
</body>
</html>
